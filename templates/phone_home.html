<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sing Room</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #181b22;
    --panel-hover: #20242e;
    --border: #2a2e38;
    --text: #e8e9ed;
    --muted: #8b8fa3;
    --accent: #ff4d6d;
    --good: #4dd28c;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  .view {
    display: none;
    flex-direction: column;
    flex: 1;
    overflow-y: auto;
    padding: 0 1.1rem 1rem;
  }

  .view.active { display: flex; }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.4rem 0 0.75rem;
  }

  header h1, header h2 { margin: 0; font-size: 1.25rem; }

  .avatar-btn {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: var(--panel-hover);
    border: 1px solid var(--border);
  }

  .search-bar-trigger {
    width: 100%;
    text-align: left;
    height: 42px;
    border-radius: 12px;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 0 14px;
    font-size: 0.9rem;
    margin-bottom: 1rem;
  }

  .invite-card {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border-radius: 16px;
    background: #202430;
    margin-bottom: 1.4rem;
  }

  .invite-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
  .invite-text { font-size: 0.85rem; font-weight: 600; }

  .invite-qr {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    background: #fff;
    padding: 4px;
    flex-shrink: 0;
  }

  .section-label {
    font-size: 0.78rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    margin: 0.4rem 0 0.6rem;
  }

  .h-scroll {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding-bottom: 1.2rem;
  }

  .trending-card {
    flex-shrink: 0;
    width: 104px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    cursor: pointer;
  }

  .trending-thumb, .result-thumb {
    width: 104px;
    height: 104px;
    border-radius: 12px;
    object-fit: cover;
    background: var(--panel-hover);
  }

  .trending-thumb.placeholder, .result-thumb.placeholder { width: 44px; height: 44px; }

  .trending-title, .result-title {
    font-size: 0.78rem;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .trending-artist, .result-artist, .queue-singer {
    font-size: 0.72rem;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .v-list { display: flex; flex-direction: column; }

  .result-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }

  .result-thumb { width: 44px; height: 44px; border-radius: 8px; flex-shrink: 0; }
  .result-info { flex: 1; min-width: 0; }

  .add-btn {
    width: 26px;
    height: 26px;
    border-radius: 6px;
    background: var(--good);
    border: none;
    color: #0f1115;
    font-size: 1rem;
    font-weight: 700;
    flex-shrink: 0;
  }

  .search-header { padding-top: 1.4rem; }

  #search-input {
    width: 100%;
    height: 42px;
    border-radius: 12px;
    background: var(--panel);
    border: 1.5px solid var(--accent);
    color: var(--text);
    padding: 0 14px;
    font-size: 0.9rem;
  }

  .loading, .empty-state {
    padding: 1.5rem 0;
    color: var(--muted);
    font-size: 0.85rem;
    text-align: center;
  }

  .queue-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }

  .queue-position { width: 20px; text-align: center; font-size: 0.85rem; font-weight: 700; color: var(--muted); flex-shrink: 0; }
  .queue-info { flex: 1; min-width: 0; }
  .queue-title { font-size: 0.85rem; font-weight: 600; }

  #tab-bar {
    display: flex;
    justify-content: space-around;
    align-items: center;
    height: 60px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .tab-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 0.68rem;
    font-weight: 600;
  }

  .tab-btn.active { color: var(--text); }

  .toast {
    position: fixed;
    left: 50%;
    bottom: 76px;
    transform: translate(-50%, 12px);
    background: var(--panel-hover);
    border: 1px solid var(--border);
    padding: 0.6rem 1rem;
    border-radius: 999px;
    font-size: 0.8rem;
    opacity: 0;
    transition: opacity 0.2s ease, transform 0.2s ease;
    pointer-events: none;
  }

  .toast.visible { opacity: 1; transform: translate(-50%, 0); }

  .now-playing-banner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.75rem;
    padding: 0.6rem 1.1rem;
    background: #202430;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .now-playing-banner[hidden] { display: none; }

  .now-playing-info { min-width: 0; }

  .now-playing-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
  }

  .now-playing-title {
    font-size: 0.85rem;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .now-playing-open {
    flex-shrink: 0;
    padding: 0.4rem 0.85rem;
    border-radius: 999px;
    background: var(--accent);
    color: #0f1115;
    font-size: 0.78rem;
    font-weight: 700;
    text-decoration: none;
  }
</style>
</head>
<body data-code="{{ code }}">
  <div id="app">

    <section id="view-home" class="view active">
      <header>
        <h1>Sing Room</h1>
        <button class="avatar-btn" type="button" aria-label="Profile"></button>
      </header>
      <button id="home-search-trigger" class="search-bar-trigger" type="button">Search songs, artists...</button>
      <div class="invite-card">
        <div>
          <div class="invite-label">Invite friends</div>
          <div class="invite-text">Have them scan the TV's QR code</div>
        </div>
        <img class="invite-qr" id="invite-qr" alt="Room QR">
      </div>
      <div class="section-label">Trending now</div>
      <div id="trending-row" class="h-scroll"></div>
      <div class="section-label">For your group</div>
      <div id="group-picks-list" class="v-list"></div>
    </section>

    <section id="view-search" class="view">
      <header class="search-header">
        <input id="search-input" type="text" placeholder="Search songs, artists...">
      </header>
      <div id="search-results" class="v-list"></div>
    </section>

    <section id="view-queue" class="view">
      <header>
        <h2>Up next</h2>
        <span id="queue-count"></span>
      </header>
      <div id="queue-list" class="v-list"></div>
    </section>

    <div id="now-playing-banner" class="now-playing-banner" hidden>
      <div class="now-playing-info">
        <div class="now-playing-label">Now singing</div>
        <div class="now-playing-title" id="now-playing-title"></div>
      </div>
      <a id="now-playing-open" class="now-playing-open" href="#">Open</a>
    </div>

    <nav id="tab-bar">
      <button class="tab-btn active" type="button" data-view="home">Home</button>
      <button class="tab-btn" type="button" data-view="search">Search</button>
      <button class="tab-btn" type="button" data-view="queue">Queue</button>
    </nav>
  </div>

  <div id="toast" class="toast"></div>

<script type="module" src="/static/phone/home.js"></script>
</body>
</html>
