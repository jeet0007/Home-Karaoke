<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join Sing Room</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #181b22;
    --border: #2a2e38;
    --text: #e8e9ed;
    --muted: #8b8fa3;
    --accent: #ff4d6d;
    --good: #4dd28c;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
    padding: 0 2rem;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    text-align: center;
  }

  .headline { font-size: 1rem; font-weight: 600; color: var(--text); }
  .subtext { font-size: 0.85rem; color: var(--muted); }

  .viewfinder {
    width: 160px;
    height: 160px;
    border: 2.5px solid var(--border);
    border-radius: 20px;
    position: relative;
  }

  #state-error { display: none; }
</style>
</head>
<body data-code="{{ code }}" data-room-exists="{{ 'true' if room_exists else 'false' }}">

  <div id="state-error" style="display: {{ 'flex' if not room_exists else 'none' }}; flex-direction: column; gap: 0.75rem;">
    <div class="headline">This code has expired</div>
    <div class="subtext">Ask the TV to show its Sing Room screen again.</div>
  </div>

  <div id="state-joining" style="display: {{ 'flex' if room_exists else 'none' }}; flex-direction: column; align-items: center; gap: 1.25rem;">
    <div class="viewfinder"></div>
    <div class="headline">Joining Sing Room…</div>
  </div>

<script type="module" src="/static/phone/join.js"></script>
</body>
</html>
