<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ title }} - {{ artist }} | Home Karaoke</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #181b22;
    --panel-hover: #20242e;
    --border: #2a2e38;
    --text: #e8e9ed;
    --muted: #8b8fa3;
    --accent: #ff4d6d;
    --accent-dim: #7a2536;
    --good: #4dd28c;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* 3-layer player background: (1) the song's YouTube thumbnail, full-bleed
     and blurred on itself - not via backdrop-filter on the content above it,
     which avoids cross-browser cost/inconsistency and the blurred-edge halo
     backdrop-filter produces - (2) a dark scrim gradient over the blur so
     lyrics/note-guide stay legible regardless of the art's colors, and
     (3) the existing lyrics + note-guide panels, restacked above both via this
     container's negative z-index. Fixed + inset:0 so it fills the viewport
     behind the normal-flow page content without needing z-index on anything
     else. */
  .art-background {
    position: fixed;
    inset: 0;
    z-index: -1;
    overflow: hidden;
    background: var(--bg);
  }

  .art-background-img {
    position: absolute;
    top: -6%;
    left: -6%;
    width: 112%;
    height: 112%;
    object-fit: cover;
    filter: blur(28px);
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  .art-background-img.is-loaded {
    opacity: 1;
  }

  .art-background-scrim {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(8, 9, 13, 0.55) 0%,
      rgba(8, 9, 13, 0.62) 45%,
      rgba(8, 9, 13, 0.92) 100%
    );
  }

  a {
    color: inherit;
    text-decoration: none;
  }

  button {
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    border-radius: 8px;
    cursor: pointer;
    font: inherit;
    font-weight: 600;
  }

  button:hover:not(:disabled) {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--panel-hover);
  }

  button:disabled {
    cursor: not-allowed;
    opacity: 0.55;
  }

  .page {
    width: min(1100px, calc(100% - 2rem));
    margin: 0 auto;
    padding: 1.25rem 0 2rem;
  }

  .topbar {
    display: grid;
    grid-template-columns: minmax(8rem, auto) 1fr minmax(8rem, auto);
    align-items: center;
    gap: 1rem;
    margin-bottom: 1rem;
  }

  .back-link {
    color: var(--muted);
    font-size: 0.92rem;
  }

  .back-link:hover { color: var(--accent); }

  .song-heading {
    min-width: 0;
    text-align: center;
  }

  .song-heading h1 {
    margin: 0;
    font-size: 1.25rem;
    font-weight: 700;
    line-height: 1.25;
    overflow-wrap: anywhere;
  }

  .song-heading span { color: var(--muted); }

  .player-shell {
    position: relative;
    overflow: hidden;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: #000;
    aspect-ratio: 16 / 9;
  }

  /* The auto-picked karaoke video is only ever played for its audio (see
     the <audio> element below) - this <img> is the entire visual surface,
     since the user never sees or picks a video in this product. */
  #cover-art {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: contain;
    background: #000;
  }

  #cover-art[hidden] {
    display: none;
  }

  .overlay {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    padding: 1.5rem;
    text-align: center;
    background: rgba(15, 17, 21, 0.78);
  }

  .overlay[hidden] { display: none; }

  .spinner {
    width: 34px;
    height: 34px;
    margin: 0 auto 0.85rem;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .overlay-title {
    margin: 0 0 0.35rem;
    font-weight: 700;
  }

  .overlay-copy {
    margin: 0;
    color: var(--muted);
    line-height: 1.45;
  }

  .note-guide-panel {
    margin-top: 0.85rem;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: rgba(12, 13, 18, 0.55);
    overflow: hidden;
  }

  .note-guide-panel[hidden] { display: none; }

  #note-guide-canvas {
    display: block;
    width: 100%;
    height: 130px;
  }

  /* Author display:block above beats the UA [hidden] rule, so hiding the
     canvas needs an explicit rule (else it stays visible under the
     "preparing" status and doubles the panel height). */
  #note-guide-canvas[hidden] { display: none; }

  .note-guide-status {
    display: grid;
    place-items: center;
    height: 130px;
    padding: 0 1rem;
    text-align: center;
    color: var(--muted);
    font-size: 0.9rem;
    line-height: 1.4;
  }

  .note-guide-status[hidden] { display: none; }

  .note-guide-status .spinner {
    width: 22px;
    height: 22px;
    margin: 0 auto 0.6rem;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin: 0.85rem 0 1rem;
    flex-wrap: wrap;
  }

  .controls button {
    min-width: 5.75rem;
    min-height: 2.4rem;
    padding: 0.55rem 0.85rem;
  }

  .volume-group {
    display: flex;
    gap: 0.4rem;
  }

  .volume-group button {
    min-width: 3.25rem;
  }

  .sync-group {
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .sync-group button {
    min-width: 4.25rem;
  }

  .sync-display {
    min-width: 4.5rem;
    text-align: center;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    font-size: 0.9rem;
  }

  .sync-display.is-offset {
    color: var(--accent);
    font-weight: 700;
  }

  .bpm-chip {
    margin-left: auto;
    min-height: 2.4rem;
    display: inline-flex;
    align-items: center;
    padding: 0.45rem 0.85rem;
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--muted);
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }

  .bpm-chip[hidden] { display: none; }

  /* When the BPM chip is present it takes the left-auto margin, so the score
     sits right after it; otherwise the score keeps pushing itself right. */
  .bpm-chip:not([hidden]) + .score { margin-left: 0.6rem; }

  .score {
    margin-left: auto;
    min-height: 2.4rem;
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.45rem 0.85rem;
    border: 1px solid var(--good);
    border-radius: 999px;
    background: var(--accent-dim);
    color: var(--good);
    font-weight: 800;
  }

  .lyrics-panel {
    height: clamp(260px, 34vh, 420px);
    overflow-y: auto;
    padding: 2rem 1rem;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: rgba(12, 13, 18, 0.5);
    scroll-behavior: smooth;
  }

  .lyrics-empty {
    min-height: 100%;
    display: grid;
    place-items: center;
    color: var(--muted);
    text-align: center;
  }

  .lyric-line {
    max-width: 850px;
    margin: 0 auto;
    padding: 0.52rem 0.75rem;
    border-radius: 8px;
    color: var(--muted);
    font-size: 1.08rem;
    line-height: 1.45;
    text-align: center;
    transition: color 0.15s ease, opacity 0.15s ease, background 0.15s ease, transform 0.15s ease;
  }

  .lyric-line.past {
    opacity: 0.42;
  }

  .lyric-line.current {
    color: var(--accent);
    background: rgba(255, 77, 109, 0.08);
    opacity: 1;
    transform: scale(1.03);
    font-weight: 800;
  }

  .lyric-line.upcoming {
    opacity: 0.72;
  }

  @media (max-width: 680px) {
    .page {
      width: min(100% - 1rem, 1100px);
      padding-top: 0.85rem;
    }

    .topbar {
      grid-template-columns: 1fr;
      gap: 0.55rem;
    }

    .song-heading {
      text-align: left;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .volume-group {
      grid-column: span 2;
    }

    .volume-group button {
      flex: 1;
    }

    .sync-group {
      grid-column: span 2;
      justify-content: center;
    }

    .sync-group button {
      flex: 1;
    }

    .score {
      grid-column: span 2;
      justify-content: center;
      margin-left: 0;
    }
  }
</style>
</head>
<body>

<div class="art-background" aria-hidden="true">
  <img id="art-background-img" class="art-background-img" alt="">
  <div class="art-background-scrim"></div>
</div>

<main class="page">
  <div class="topbar">
    <a class="back-link" href="/">Back to search</a>
    <div class="song-heading">
      <h1>{{ title }} <span>&mdash; {{ artist }}</span></h1>
    </div>
    <div aria-hidden="true"></div>
  </div>

  <section class="player-shell" aria-label="Karaoke player">
    <!-- The video is never shown - only its audio track streams in the
         background (see the JS below for why an <audio> element, not a
         hidden <video>, drives playback). This cover art is the whole
         visual surface. -->
    <img id="cover-art" alt="" hidden>
    <audio id="audio" preload="auto" style="display: none;"></audio>
    <div id="player-overlay" class="overlay">
      <div>
        <div class="spinner" aria-hidden="true"></div>
        <p class="overlay-title">Finding a karaoke backing track</p>
        <p class="overlay-copy">Looking up lyrics and a matching video...</p>
      </div>
    </div>
  </section>

  <!-- Visual note guide: a scrolling piano-roll of the song's reference
       melody (extracted server-side by the library worker - see melody.py),
       with a live dot showing the singer's own pitch. Entirely additive:
       songs without a processed melody simply never show this panel. -->
  <section id="note-guide-panel" class="note-guide-panel" aria-label="Note guide" aria-hidden="true" hidden>
    <div id="note-guide-status" class="note-guide-status" hidden></div>
    <canvas id="note-guide-canvas"></canvas>
  </section>

  <section class="controls" aria-label="Playback controls">
    <button id="play-pause" type="button" disabled>Play</button>
    <button id="restart" type="button" disabled>Restart</button>
    <div class="volume-group" aria-label="Volume controls">
      <button id="volume-down" type="button" disabled>Vol -</button>
      <button id="volume-up" type="button" disabled>Vol +</button>
    </div>
    <!-- Nudge the lyrics/note-guide timeline against the backing track: the
         karaoke video's intro can be a different length than the recording
         the lyrics were timed to, so they drift. This shifts them back into
         sync ([ / ] keys), remembered per song. -->
    <div class="sync-group" aria-label="Lyric sync">
      <button id="sync-earlier" type="button" title="Lyrics earlier ([)">Lyrics -</button>
      <span id="sync-display" class="sync-display" title="Lyric timing offset">Sync 0.0s</span>
      <button id="sync-later" type="button" title="Lyrics later (])">Lyrics +</button>
    </div>
    <div id="bpm-chip" class="bpm-chip" aria-label="Tempo" hidden></div>
    <div class="score" aria-label="Score">Score: <span>★ --</span></div>
  </section>

  <section id="lyrics-panel" class="lyrics-panel" aria-live="polite">
    <div class="lyrics-empty">Loading lyrics...</div>
  </section>
</main>

<script src="/static/thumbnail-fallback.js"></script>
<script>
  const songTitle = {{ title|tojson }};
  const artist = {{ artist|tojson }};
  const durationHint = {{ duration|tojson }};
  const ytmusicVideoId = {{ ytmusic_video_id|tojson }};

  const coverArt = document.getElementById('cover-art');
  const artBackgroundImg = document.getElementById('art-background-img');
  const audio = document.getElementById('audio');
  const overlay = document.getElementById('player-overlay');
  const playPauseBtn = document.getElementById('play-pause');
  const restartBtn = document.getElementById('restart');
  const volumeDownBtn = document.getElementById('volume-down');
  const volumeUpBtn = document.getElementById('volume-up');
  const lyricsPanel = document.getElementById('lyrics-panel');
  const syncEarlierBtn = document.getElementById('sync-earlier');
  const syncLaterBtn = document.getElementById('sync-later');
  const syncDisplay = document.getElementById('sync-display');

  let lyrics = [];
  let lyricNodes = [];
  let currentLyricIndex = -1;
  let animationFrameId = null;
  let melodyNotes = null;
  let melodyMidiMin = 0;
  let melodyMidiMax = 0;

  // -- Lyric/melody sync offset --------------------------------------
  //
  // The lyrics + note guide are timed to the ORIGINAL recording, but the
  // backing track is a different karaoke video whose intro can be a
  // different length - so they drift (e.g. lyrics start singing while the
  // intro is still playing). This offset (ms) shifts the lyric/melody
  // timeline against the audio clock: positive delays them (use when they
  // run ahead of the music). It's applied to lyric highlighting, the note
  // guide, and the grading position. Remembered per backing video in
  // localStorage.
  const SYNC_STEP_MS = 200;
  const SYNC_LIMIT_MS = 30000;
  let syncOffsetMs = 0;
  let syncStorageKey = null;

  function effectiveLyricMs() {
    return audio.currentTime * 1000 - syncOffsetMs;
  }

  function renderSyncDisplay() {
    const seconds = syncOffsetMs / 1000;
    const sign = seconds > 0 ? '+' : '';
    syncDisplay.textContent = `Sync ${sign}${seconds.toFixed(1)}s`;
    syncDisplay.classList.toggle('is-offset', syncOffsetMs !== 0);
  }

  function loadSyncOffset(videoId) {
    syncStorageKey = videoId ? `karaoke-sync-${videoId}` : null;
    let stored = 0;
    try {
      if (syncStorageKey) stored = Number(localStorage.getItem(syncStorageKey)) || 0;
    } catch (err) {
      // localStorage unavailable (private mode) - offset just won't persist.
    }
    syncOffsetMs = Math.max(-SYNC_LIMIT_MS, Math.min(SYNC_LIMIT_MS, stored));
    renderSyncDisplay();
  }

  function adjustSyncOffset(deltaMs) {
    syncOffsetMs = Math.max(-SYNC_LIMIT_MS, Math.min(SYNC_LIMIT_MS, syncOffsetMs + deltaMs));
    renderSyncDisplay();
    try {
      if (syncStorageKey) localStorage.setItem(syncStorageKey, String(syncOffsetMs));
    } catch (err) {
      // best-effort persistence
    }
    // Re-place the current lyric immediately and re-sync the grader so the
    // change is felt without waiting for the next animation frame / tick.
    currentLyricIndex = -1;
    updateCurrentLyric(effectiveLyricMs());
    sendPositionSync();
  }

  function setOverlayLoading(message) {
    overlay.hidden = false;
    overlay.innerHTML = `
      <div>
        <div class="spinner" aria-hidden="true"></div>
        <p class="overlay-title">Finding a karaoke backing track</p>
        <p class="overlay-copy">${message}</p>
      </div>
    `;
  }

  function setOverlayMessage(title, message) {
    overlay.hidden = false;
    overlay.innerHTML = '';

    const wrap = document.createElement('div');
    const titleEl = document.createElement('p');
    const copy = document.createElement('p');

    titleEl.className = 'overlay-title';
    titleEl.textContent = title;
    copy.className = 'overlay-copy';
    copy.textContent = message;

    wrap.append(titleEl, copy);
    overlay.appendChild(wrap);
  }

  function setOverlayError(message) {
    setOverlayMessage('Could not load this song', message);
  }

  function setOverlayNoBackingTrack(message) {
    setOverlayMessage('No backing track found', message);
  }

  // Layer 1 of the player background: the song's own YouTube thumbnail,
  // blurred full-bleed behind the lyrics/note-guide (see the .art-background
  // rules above). ThumbnailFallback (static/thumbnail-fallback.js) walks
  // maxresdefault -> sddefault -> hqdefault -> mqdefault since maxresdefault
  // doesn't exist for every upload. Best-effort: if every quality misses,
  // the background just stays the plain --bg fill it already has.
  function setArtBackground(videoId) {
    if (!videoId || typeof ThumbnailFallback === 'undefined') return;
    ThumbnailFallback.attachThumbnailFallback(artBackgroundImg, videoId, () => {
      artBackgroundImg.classList.add('is-loaded');
    });
  }

  function enableControls() {
    [playPauseBtn, restartBtn, volumeDownBtn, volumeUpBtn].forEach((button) => {
      button.disabled = false;
    });
  }

  function setPlayButton() {
    playPauseBtn.textContent = audio.paused ? 'Play' : 'Pause';
  }

  async function togglePlayback() {
    if (!audio.src) return;

    audio.muted = false;
    if (audio.paused) {
      try {
        await audio.play();
      } catch (err) {
        setOverlayError('The browser blocked playback until you interact with the page.');
      }
      ensureGradingStarted();
    } else {
      audio.pause();
    }
    setPlayButton();
  }

  async function restartPlayback() {
    if (!audio.src) return;

    audio.muted = false;
    audio.currentTime = 0;
    currentLyricIndex = -1;
    updateCurrentLyric(effectiveLyricMs());
    try {
      await audio.play();
    } catch (err) {
      setOverlayError('The browser blocked playback until you interact with the page.');
    }
    ensureGradingStarted();
    setPlayButton();
  }

  function changeVolume(delta) {
    audio.muted = false;
    audio.volume = Math.max(0, Math.min(1, audio.volume + delta));
  }

  function showLyricsFallback() {
    lyricsPanel.innerHTML = '<div class="lyrics-empty">No lyrics found &mdash; enjoy the music!</div>';
  }

  // /select-song's lyrics fetch now runs with a generous timeout (see
  // lyrica_client.py), but Lyrica itself can still take longer than that to
  // finish caching a slow source (e.g. a struggling LRCLIB response) - in
  // that window /select-song already returned with no lyrics. One retry a
  // few seconds later, straight against Lyrica via the existing /lyrics
  // route, catches the case where the result showed up moments too late
  // without holding up the initial response. Best-effort only: on any
  // failure the "no lyrics" fallback already on screen simply stays.
  const LYRICS_RETRY_DELAY_MS = 6000;

  async function retryLyricsOnce(artistName, songTitle, durationHint) {
    try {
      const params = new URLSearchParams({ artist: artistName, title: songTitle });
      if (durationHint) params.set('duration', durationHint);

      const res = await fetch(`/lyrics?${params.toString()}`);
      if (!res.ok) return;

      const data = await res.json();
      renderLyrics(data.synced);
    } catch (err) {
      // Best-effort - leave the existing fallback state as-is.
    }
  }

  function renderLyrics(syncedLines) {
    const cleaned = (syncedLines || [])
      .filter((line) => Number.isFinite(Number(line.time_ms)) && line.text)
      .map((line) => ({ time_ms: Number(line.time_ms), text: String(line.text) }))
      .sort((a, b) => a.time_ms - b.time_ms);

    if (cleaned.length === 0) {
      showLyricsFallback();
      return;
    }

    lyrics = cleaned;
    lyricsPanel.innerHTML = '';
    lyricNodes = lyrics.map((line) => {
      const node = document.createElement('div');
      node.className = 'lyric-line upcoming';
      node.textContent = line.text;
      lyricsPanel.appendChild(node);
      return node;
    });
  }

  function findCurrentLyricIndex(nowMs) {
    let low = 0;
    let high = lyrics.length - 1;
    let result = -1;

    while (low <= high) {
      const mid = Math.floor((low + high) / 2);
      if (lyrics[mid].time_ms <= nowMs) {
        result = mid;
        low = mid + 1;
      } else {
        high = mid - 1;
      }
    }

    return result;
  }

  function updateCurrentLyric(nowMs) {
    if (lyrics.length === 0) return;

    const nextIndex = findCurrentLyricIndex(nowMs);
    if (nextIndex === currentLyricIndex) return;

    currentLyricIndex = nextIndex;
    lyricNodes.forEach((node, index) => {
      node.classList.toggle('past', index < currentLyricIndex);
      node.classList.toggle('current', index === currentLyricIndex);
      node.classList.toggle('upcoming', index > currentLyricIndex);
    });

    if (currentLyricIndex >= 0) {
      lyricNodes[currentLyricIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }

  function syncLyrics() {
    // Lyrics + note guide follow the (offset-adjusted) lyric timeline.
    const lyricMs = effectiveLyricMs();
    updateCurrentLyric(lyricMs);
    drawNoteGuide(lyricMs);
    animationFrameId = requestAnimationFrame(syncLyrics);
  }

  // -- Visual note guide (optional) -----------------------------------
  //
  // A scrolling piano-roll of the reference melody: time flows left to
  // right, the vertical axis is pitch, and a "now" line sits at 25% of the
  // width so most of the panel shows what's coming. The singer's own live
  // pitch (from the same /grade updates that drive the score) is drawn as
  // a dot on the now line, octave-folded into the melody's display range -
  // matching how the server scores accuracy (singing in your own octave is
  // on-pitch). Entirely additive: no processed melody, no panel.
  const noteGuidePanel = document.getElementById('note-guide-panel');
  const noteGuideStatus = document.getElementById('note-guide-status');
  const noteGuideCanvas = document.getElementById('note-guide-canvas');
  const noteGuideCtx = noteGuideCanvas.getContext('2d');
  const bpmChip = document.getElementById('bpm-chip');

  // The song's estimated tempo (from librosa, server-side). Shown as a chip
  // when available; songs processed without the tempo add-on just don't show
  // one. See core/tempo.py.
  function setBpm(bpm) {
    const value = Number(bpm);
    if (Number.isFinite(value) && value > 0) {
      bpmChip.textContent = `♩ ${Math.round(value)} BPM`;
      bpmChip.hidden = false;
    } else {
      bpmChip.hidden = true;
    }
  }

  const NOTE_GUIDE_LOOKBACK_MS = 2000;
  const NOTE_GUIDE_LOOKAHEAD_MS = 6000;
  const NOTE_GUIDE_NOW_FRACTION = NOTE_GUIDE_LOOKBACK_MS / (NOTE_GUIDE_LOOKBACK_MS + NOTE_GUIDE_LOOKAHEAD_MS);
  const LIVE_PITCH_STALE_MS = 700;

  let livePitchMidi = null;
  let livePitchAtMs = 0;

  function hzToMidi(frequencyHz) {
    return 69 + 12 * Math.log2(frequencyHz / 440);
  }

  function setupNoteGuide(notes) {
    const cleaned = (notes || [])
      .filter((n) => Number.isFinite(Number(n.start_ms)) && Number.isFinite(Number(n.end_ms)) && Number.isFinite(Number(n.midi)))
      .map((n) => ({ start_ms: Number(n.start_ms), end_ms: Number(n.end_ms), midi: Number(n.midi) }))
      .sort((a, b) => a.start_ms - b.start_ms);
    if (cleaned.length === 0) return false;

    melodyNotes = cleaned;
    const midis = cleaned.map((n) => n.midi);
    melodyMidiMin = Math.min(...midis) - 2;
    melodyMidiMax = Math.max(...midis) + 2;
    noteGuidePanel.hidden = false;
    noteGuidePanel.setAttribute('aria-hidden', 'false');
    noteGuideStatus.hidden = true;
    noteGuideCanvas.hidden = false;
    return true;
  }

  // First-play UX: a freshly picked song's melody is still being extracted
  // in the background, so /select-song returns melody=null and there'd be
  // no guide at all. Instead show the panel with a "preparing" message and
  // poll the cheap /song-melody endpoint until the worker has stored it,
  // then render the guide - no manual reload needed. Best-effort: if it
  // never arrives (e.g. ffmpeg missing on the server) the message just
  // stays and the rest of the player is unaffected.
  const MELODY_POLL_INTERVAL_MS = 8000;
  const MELODY_POLL_MAX_ATTEMPTS = 45;  // ~6 min, enough for the slow Demucs path
  let melodyPollTimer = null;

  function showNoteGuidePreparing() {
    noteGuidePanel.hidden = false;
    noteGuidePanel.setAttribute('aria-hidden', 'false');
    noteGuideCanvas.hidden = true;
    noteGuideStatus.hidden = false;
    noteGuideStatus.innerHTML =
      '<div><div class="spinner" aria-hidden="true"></div>Preparing the note guide for this song&hellip;<br>it will appear here once ready.</div>';
  }

  function showNoteGuideUnavailable() {
    noteGuideStatus.innerHTML =
      '<div>No note guide is available for this song.<br>' +
      '(The note guide needs the vocal-transcription add-on installed on the server.)</div>';
  }

  async function pollForMelody(artistName, songTitle) {
    let attempts = 0;
    const poll = async () => {
      attempts += 1;
      try {
        const params = new URLSearchParams({ artist: artistName, title: songTitle });
        const res = await fetch(`/song-melody?${params.toString()}`);
        if (res.ok) {
          const data = await res.json();
          if (data.melody && data.melody.length && setupNoteGuide(data.melody)) {
            setBpm(data.bpm);
            return;  // guide rendered - stop polling
          }
          // Song finished processing but produced no melody (e.g. the ML
          // add-on isn't installed) - it's never going to appear, so stop
          // polling and say so plainly instead of spinning for minutes.
          if (data.ready) {
            showNoteGuideUnavailable();
            return;
          }
        }
      } catch (err) {
        // best-effort - keep trying until the song is ready or the cap
      }
      if (attempts < MELODY_POLL_MAX_ATTEMPTS) {
        melodyPollTimer = setTimeout(poll, MELODY_POLL_INTERVAL_MS);
      } else {
        showNoteGuideUnavailable();
      }
    };
    melodyPollTimer = setTimeout(poll, MELODY_POLL_INTERVAL_MS);
  }

  function resizeNoteGuideCanvasIfNeeded() {
    const rect = noteGuideCanvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    const width = Math.max(1, Math.round(rect.width * dpr));
    const height = Math.max(1, Math.round(rect.height * dpr));
    if (noteGuideCanvas.width !== width || noteGuideCanvas.height !== height) {
      noteGuideCanvas.width = width;
      noteGuideCanvas.height = height;
    }
  }

  function midiToY(midi, height) {
    const range = Math.max(1, melodyMidiMax - melodyMidiMin);
    const fraction = (midi - melodyMidiMin) / range;
    return height - fraction * height;
  }

  function foldMidiIntoRange(midi) {
    // Shift by whole octaves until the dot lands inside the melody's
    // displayed range - the same octave-equivalence the server grades with.
    let folded = midi;
    while (folded < melodyMidiMin && folded + 12 <= melodyMidiMax + 6) folded += 12;
    while (folded > melodyMidiMax && folded - 12 >= melodyMidiMin - 6) folded -= 12;
    return folded;
  }

  function drawNoteGuide(nowMs) {
    if (!melodyNotes) return;

    resizeNoteGuideCanvasIfNeeded();
    const width = noteGuideCanvas.width;
    const height = noteGuideCanvas.height;
    const dpr = window.devicePixelRatio || 1;
    noteGuideCtx.clearRect(0, 0, width, height);

    const windowStart = nowMs - NOTE_GUIDE_LOOKBACK_MS;
    const windowMs = NOTE_GUIDE_LOOKBACK_MS + NOTE_GUIDE_LOOKAHEAD_MS;
    const barHeight = Math.max(3 * dpr, height / Math.max(1, melodyMidiMax - melodyMidiMin) * 0.9);

    for (const note of melodyNotes) {
      if (note.end_ms < windowStart) continue;
      if (note.start_ms > windowStart + windowMs) break;

      const x0 = ((note.start_ms - windowStart) / windowMs) * width;
      const x1 = ((note.end_ms - windowStart) / windowMs) * width;
      const y = midiToY(note.midi, height);
      const active = nowMs >= note.start_ms && nowMs < note.end_ms;

      if (active) {
        noteGuideCtx.fillStyle = '#ff4d6d';
      } else if (note.end_ms <= nowMs) {
        noteGuideCtx.fillStyle = 'rgba(255, 255, 255, 0.22)';
      } else {
        noteGuideCtx.fillStyle = 'rgba(255, 255, 255, 0.55)';
      }
      const barWidth = Math.max(2, x1 - x0 - 1);
      if (typeof noteGuideCtx.roundRect === 'function') {
        noteGuideCtx.beginPath();
        noteGuideCtx.roundRect(x0, y - barHeight / 2, barWidth, barHeight, barHeight / 2);
        noteGuideCtx.fill();
      } else {
        noteGuideCtx.fillRect(x0, y - barHeight / 2, barWidth, barHeight);
      }
    }

    // The "now" line.
    const nowX = NOTE_GUIDE_NOW_FRACTION * width;
    noteGuideCtx.fillStyle = 'rgba(255, 255, 255, 0.35)';
    noteGuideCtx.fillRect(nowX, 0, Math.max(1, dpr), height);

    // The singer's live pitch dot.
    if (livePitchMidi !== null && performance.now() - livePitchAtMs < LIVE_PITCH_STALE_MS) {
      const y = midiToY(foldMidiIntoRange(livePitchMidi), height);
      noteGuideCtx.fillStyle = '#4dd28c';
      noteGuideCtx.beginPath();
      noteGuideCtx.arc(nowX, Math.max(0, Math.min(height, y)), 5 * dpr, 0, Math.PI * 2);
      noteGuideCtx.fill();
    }
  }

  async function loadStream(videoId) {
    setOverlayLoading('Resolving the playable stream...');

    try {
      const res = await fetch(`/stream-url?video_id=${encodeURIComponent(videoId)}`);
      const data = await res.json();
      if (!res.ok || !data.stream_url) {
        throw new Error(data.error || 'The stream URL could not be resolved.');
      }

      if (data.warning) {
        console.warn(data.warning);
      }

      audio.src = data.stream_url;
      audio.load();
      overlay.hidden = true;
      enableControls();
    } catch (err) {
      setOverlayError(err.message || 'The stream URL could not be resolved.');
    }
  }

  async function loadSong() {
    setOverlayLoading('Looking up lyrics and a matching video...');

    try {
      const params = new URLSearchParams({ artist, title: songTitle });
      if (durationHint) params.set('duration', durationHint);
      if (ytmusicVideoId) params.set('ytmusic_video_id', ytmusicVideoId);

      const res = await fetch(`/select-song?${params.toString()}`);
      const data = await res.json();

      if (!res.ok) {
        setOverlayError(data.error || 'Could not load this song.');
        showLyricsFallback();
        return;
      }

      if (data.cover_art) {
        coverArt.src = data.cover_art;
        coverArt.hidden = false;
      }

      // Reference melody only exists for library-processed songs. A
      // first-time pick returns null while the background worker is still
      // extracting it - show a "preparing" state and poll until it lands,
      // rather than leaving the guide silently blank.
      if (data.melody && data.melody.length) {
        setupNoteGuide(data.melody);
      } else if (ytmusicVideoId) {
        showNoteGuidePreparing();
        pollForMelody(artist, songTitle);
      }
      setBpm(data.bpm);

      const syncedLines = (data.lyrics && data.lyrics.synced) || [];
      renderLyrics(syncedLines);
      if (syncedLines.length === 0) {
        setTimeout(() => retryLyricsOnce(artist, songTitle, durationHint), LYRICS_RETRY_DELAY_MS);
      }

      if (!data.video_id) {
        setOverlayNoBackingTrack(data.message || 'No backing track found for this song.');
        return;
      }

      // Restore any sync nudge saved for this backing track on a past visit.
      loadSyncOffset(data.video_id);
      setArtBackground(data.video_id);
      await loadStream(data.video_id);
    } catch (err) {
      setOverlayError('Network error — is the server running?');
      showLyricsFallback();
    }
  }

  // -- Live pitch/energy grading (optional) --------------------------
  //
  // Entirely additive: if the mic is denied/unavailable, or the browser
  // lacks WebSocket/AudioContext support, grading silently never starts
  // and the rest of the player (video/audio playback + lyrics sync) works
  // exactly as it did before this feature existed. See audio_grading.py
  // for what the score does and does not measure (no reference-melody
  // comparison - pitch stability + voice-activity only).
  const scoreValueEl = document.querySelector('.score span');
  const GRADING_CHUNK_SAMPLES = 2048;

  let gradingStarted = false;
  let gradingStream = null;
  let gradingAudioContext = null;
  let gradingSocket = null;
  let gradingSourceNode = null;
  let gradingProcessorNode = null;

  function setScoreDisplay(text) {
    if (scoreValueEl) scoreValueEl.textContent = text;
  }

  function renderScoreUpdate(update) {
    if (!update || update.error) return;
    setScoreDisplay(update.singing ? `★ ${update.score}` : '★ --');
    if (update.frequency_hz) {
      livePitchMidi = hzToMidi(update.frequency_hz);
      livePitchAtMs = performance.now();
    }
  }

  // Position syncs map the mic stream's clock onto song time server-side
  // (see audio_grading.RealtimeGrader.set_position) so melody-accuracy
  // grading lines up with the backing track; without a melody they're
  // harmless no-ops, so they're sent unconditionally.
  const POSITION_SYNC_INTERVAL_MS = 1000;
  let positionSyncIntervalId = null;

  function sendPositionSync() {
    if (gradingSocket && gradingSocket.readyState === WebSocket.OPEN) {
      // The grader compares the mic to the melody, which is on the lyric
      // timeline - so sync it to the offset-adjusted position too.
      gradingSocket.send(JSON.stringify({ pos_ms: effectiveLyricMs() }));
    }
  }

  function startPositionSyncs() {
    if (positionSyncIntervalId !== null) return;
    positionSyncIntervalId = setInterval(() => {
      if (!audio.paused) sendPositionSync();
    }, POSITION_SYNC_INTERVAL_MS);
  }

  function stopGrading() {
    if (positionSyncIntervalId !== null) {
      clearInterval(positionSyncIntervalId);
      positionSyncIntervalId = null;
    }
    if (gradingProcessorNode) {
      gradingProcessorNode.disconnect();
      gradingProcessorNode.port && (gradingProcessorNode.port.onmessage = null);
      gradingProcessorNode.onaudioprocess = null;
      gradingProcessorNode = null;
    }
    if (gradingSourceNode) {
      gradingSourceNode.disconnect();
      gradingSourceNode = null;
    }
    if (gradingStream) {
      gradingStream.getTracks().forEach((track) => track.stop());
      gradingStream = null;
    }
    if (gradingSocket) {
      const socket = gradingSocket;
      gradingSocket = null;
      try {
        socket.close();
      } catch (err) {
        // already closed/closing - nothing to do
      }
    }
    if (gradingAudioContext) {
      const ctx = gradingAudioContext;
      gradingAudioContext = null;
      ctx.close().catch(() => {});
    }
    setScoreDisplay('★ --');
  }

  function sendPcmChunk(socket, samples) {
    if (socket.readyState === WebSocket.OPEN) {
      // Float32Array.slice() copies the underlying buffer so it's safe to
      // hand off/transfer even though `samples` may be reused by the audio
      // graph right after this call returns.
      socket.send(samples.slice().buffer);
    }
  }

  async function attachScriptProcessorFallback(audioContext, source, socket, silentGain) {
    // AudioWorkletNode is preferred (see below); ScriptProcessorNode is
    // deprecated but kept as a fallback for browsers/contexts where
    // audioWorklet.addModule() fails, since it needs no separate module
    // file and is still broadly supported.
    const processor = audioContext.createScriptProcessor(GRADING_CHUNK_SAMPLES, 1, 1);
    processor.onaudioprocess = (event) => {
      sendPcmChunk(socket, event.inputBuffer.getChannelData(0));
    };
    source.connect(processor);
    // Per the Web Audio spec a node only reliably processes once it's part
    // of a graph reachable from the destination; route through a
    // zero-gain node so the mic is never actually audible.
    processor.connect(silentGain);
    gradingProcessorNode = processor;
  }

  async function attachAudioWorklet(audioContext, source, socket, silentGain) {
    await audioContext.audioWorklet.addModule('/static/grading-worklet.js');
    const node = new AudioWorkletNode(audioContext, 'grading-processor');
    node.port.onmessage = (event) => sendPcmChunk(socket, event.data);
    source.connect(node);
    node.connect(silentGain);
    gradingProcessorNode = node;
  }

  async function ensureGradingStarted() {
    if (gradingStarted) return;
    gradingStarted = true;

    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia || !window.WebSocket) {
      return;
    }

    let stream;
    try {
      stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (err) {
      // Mic permission denied or no mic available - grading is optional,
      // the rest of the player is unaffected.
      console.warn('Live scoring disabled (mic unavailable):', err.message || err);
      return;
    }
    gradingStream = stream;

    const AudioContextCtor = window.AudioContext || window.webkitAudioContext;
    if (!AudioContextCtor) {
      stopGrading();
      return;
    }
    const audioContext = new AudioContextCtor();
    gradingAudioContext = audioContext;

    const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    let socket;
    try {
      socket = new WebSocket(`${wsProtocol}//${window.location.host}/grade`);
    } catch (err) {
      stopGrading();
      return;
    }
    socket.binaryType = 'arraybuffer';
    gradingSocket = socket;

    socket.addEventListener('open', () => {
      const handshake = { sample_rate: audioContext.sampleRate };
      if (melodyNotes) handshake.melody = melodyNotes;
      socket.send(JSON.stringify(handshake));
      sendPositionSync();
      startPositionSyncs();
    });
    socket.addEventListener('message', (event) => {
      try {
        renderScoreUpdate(JSON.parse(event.data));
      } catch (err) {
        // ignore malformed/unexpected message
      }
    });
    socket.addEventListener('close', stopGrading);
    socket.addEventListener('error', stopGrading);

    const source = audioContext.createMediaStreamSource(stream);
    gradingSourceNode = source;
    const silentGain = audioContext.createGain();
    silentGain.gain.value = 0;
    silentGain.connect(audioContext.destination);

    try {
      await attachAudioWorklet(audioContext, source, socket, silentGain);
    } catch (err) {
      console.warn('AudioWorklet unavailable, falling back to ScriptProcessorNode:', err.message || err);
      try {
        await attachScriptProcessorFallback(audioContext, source, socket, silentGain);
      } catch (fallbackErr) {
        console.warn('Live scoring disabled (no usable audio processing node):', fallbackErr.message || fallbackErr);
        stopGrading();
      }
    }
  }

  playPauseBtn.addEventListener('click', togglePlayback);
  restartBtn.addEventListener('click', restartPlayback);
  volumeDownBtn.addEventListener('click', () => changeVolume(-0.1));
  volumeUpBtn.addEventListener('click', () => changeVolume(0.1));
  syncEarlierBtn.addEventListener('click', () => adjustSyncOffset(-SYNC_STEP_MS));
  syncLaterBtn.addEventListener('click', () => adjustSyncOffset(SYNC_STEP_MS));

  audio.addEventListener('play', setPlayButton);
  audio.addEventListener('pause', setPlayButton);
  audio.addEventListener('ended', setPlayButton);
  // Re-sync the grader's song clock immediately on resume/scrub instead of
  // waiting up to a full interval tick with a stale position.
  audio.addEventListener('play', sendPositionSync);
  audio.addEventListener('seeked', sendPositionSync);
  audio.addEventListener('error', () => {
    setOverlayError('The resolved stream was rejected by the browser or expired.');
  });

  document.addEventListener('keydown', (e) => {
    const tagName = e.target.tagName;
    if (tagName === 'INPUT' || tagName === 'TEXTAREA' || e.target.isContentEditable) return;

    if (e.code === 'Space') {
      e.preventDefault();
      togglePlayback();
    } else if (e.key.toLowerCase() === 'r') {
      restartPlayback();
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      changeVolume(0.1);
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      changeVolume(-0.1);
    } else if (e.key === '[') {
      e.preventDefault();
      adjustSyncOffset(-SYNC_STEP_MS);
    } else if (e.key === ']') {
      e.preventDefault();
      adjustSyncOffset(SYNC_STEP_MS);
    }
  });

  audio.autoplay = true;
  audio.muted = true;
  loadSong();
  animationFrameId = requestAnimationFrame(syncLyrics);
  window.addEventListener('beforeunload', () => {
    cancelAnimationFrame(animationFrameId);
    if (melodyPollTimer !== null) clearTimeout(melodyPollTimer);
    stopGrading();
  });
</script>

</body>
</html>
