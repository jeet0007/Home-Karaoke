<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Karaoke Search — by song</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #181b22;
    --panel-hover: #20242e;
    --border: #2a2e38;
    --text: #e8e9ed;
    --muted: #8b8fa3;
    --accent: #ff4d6d;
    --accent-dim: #7a2536;
    --good: #4dd28c;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  a { color: var(--accent); }

  header {
    padding: 2.5rem 1.5rem 1.5rem;
    text-align: center;
  }

  header h1 {
    margin: 0 0 0.25rem;
    font-size: 1.8rem;
    letter-spacing: 0.02em;
  }

  header h1 span { color: var(--accent); }

  header p {
    margin: 0;
    color: var(--muted);
    font-size: 0.9rem;
  }

  .search-bar {
    max-width: 640px;
    margin: 1.5rem auto 0;
    display: flex;
    gap: 0.5rem;
    padding: 0 1.5rem;
  }

  #query {
    flex: 1;
    padding: 0.85rem 1rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    font-size: 1rem;
    outline: none;
  }

  #query:focus {
    border-color: var(--accent);
  }

  #search-btn {
    padding: 0.85rem 1.4rem;
    border-radius: 8px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
  }

  #search-btn:hover { background: #ff2e53; }

  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  #status {
    text-align: center;
    color: var(--muted);
    min-height: 1.5rem;
    margin-bottom: 1.5rem;
  }

  #status.error { color: var(--accent); }

  .spinner {
    width: 28px;
    height: 28px;
    margin: 1rem auto;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  #back-to-songs {
    display: none;
    margin: 0 0 1rem;
  }

  #back-to-songs button {
    padding: 0.5rem 1rem;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    cursor: pointer;
  }

  #back-to-songs button:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .list {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .song-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.9rem 1.1rem;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  .song-row:hover {
    background: var(--panel-hover);
    border-color: var(--accent);
  }

  .song-info { min-width: 0; }

  .song-title {
    font-weight: 600;
    font-size: 1rem;
  }

  .song-meta {
    color: var(--muted);
    font-size: 0.85rem;
    margin-top: 0.15rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .song-duration {
    color: var(--muted);
    font-size: 0.85rem;
    flex-shrink: 0;
  }

  .video-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.75rem;
  }

  .video-row img {
    width: 120px;
    aspect-ratio: 16 / 9;
    object-fit: cover;
    border-radius: 6px;
    flex-shrink: 0;
    background: #000;
  }

  .video-info { min-width: 0; flex: 1; }

  .video-title {
    font-weight: 600;
    font-size: 0.92rem;
    line-height: 1.3;
  }

  .video-meta {
    color: var(--muted);
    font-size: 0.8rem;
    margin-top: 0.25rem;
  }

  .video-score {
    color: var(--good);
    font-weight: 700;
  }

  .video-row button {
    padding: 0.5rem 0.9rem;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    flex-shrink: 0;
  }

  .video-row button:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .empty-state {
    text-align: center;
    color: var(--muted);
    padding: 3rem 1rem;
  }
</style>
</head>
<body>

<header>
  <h1>Home <span>Karaoke</span> Search</h1>
  <p>Search by song name — we resolve the exact artist and title first, then find a matching karaoke video.</p>
  <p><a href="/">Search by video instead &rarr;</a></p>
</header>

<div class="search-bar">
  <input id="query" type="text" placeholder="e.g. Let Her Go Passenger" autofocus autocomplete="off">
  <button id="search-btn">Search</button>
</div>

<main>
  <div id="back-to-songs">
    <button id="back-btn" type="button">&larr; Back to song results</button>
  </div>
  <div id="status"></div>
  <div id="results" class="list"></div>
</main>

<script>
  const queryInput = document.getElementById('query');
  const searchBtn = document.getElementById('search-btn');
  const statusEl = document.getElementById('status');
  const resultsEl = document.getElementById('results');
  const backWrap = document.getElementById('back-to-songs');
  const backBtn = document.getElementById('back-btn');

  let lastSongResults = [];

  function setStatus(html, isError) {
    statusEl.innerHTML = html;
    statusEl.className = isError ? 'error' : '';
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str == null ? '' : String(str);
    return div.innerHTML;
  }

  function formatDuration(seconds) {
    if (seconds == null) return '';
    seconds = Math.round(Number(seconds));
    if (!Number.isFinite(seconds)) return '';
    const minutes = Math.floor(seconds / 60);
    const secs = seconds % 60;
    return `${minutes}:${String(secs).padStart(2, '0')}`;
  }

  function renderSongRow(song) {
    const meta = [song.album, formatDuration(song.duration_seconds)].filter(Boolean).join(' · ');
    return `
      <div class="song-row" data-artist="${escapeHtml(song.artist)}" data-title="${escapeHtml(song.title)}">
        <div class="song-info">
          <div class="song-title">${escapeHtml(song.title)} <span style="color: var(--muted);">&mdash; ${escapeHtml(song.artist)}</span></div>
          ${meta ? `<div class="song-meta">${escapeHtml(meta)}</div>` : ''}
        </div>
      </div>
    `;
  }

  function renderVideoRow(video, artist, title) {
    const thumb = video.thumbnail || '';
    const meta = [video.uploader, video.duration].filter(Boolean).join(' · ');
    const playerParams = new URLSearchParams({
      video_id: video.video_id || '',
      title: title,
      artist: artist,
      url: video.url || ''
    });
    return `
      <div class="video-row">
        ${thumb ? `<img src="${escapeHtml(thumb)}" loading="lazy" alt="">` : ''}
        <div class="video-info">
          <div class="video-title">${escapeHtml(video.title)}</div>
          <div class="video-meta"><span class="video-score">&#9733; ${video.score}</span> · ${escapeHtml(meta)}</div>
        </div>
        <button class="open-btn" data-url="/player?${playerParams.toString()}">Open Player</button>
      </div>
    `;
  }

  async function runSongSearch() {
    const query = queryInput.value.trim();
    if (!query) return;

    backWrap.style.display = 'none';
    resultsEl.innerHTML = '';
    setStatus('<div class="spinner"></div>', false);
    searchBtn.disabled = true;

    try {
      const res = await fetch(`/song-search?q=${encodeURIComponent(query)}&limit=12`);
      const data = await res.json();

      if (!res.ok) {
        setStatus(escapeHtml(data.error || 'Song search failed.'), true);
        return;
      }

      lastSongResults = data.results || [];

      if (lastSongResults.length === 0) {
        setStatus('');
        resultsEl.innerHTML = `<div class="empty-state">No songs found for "${escapeHtml(query)}". Try a different search.</div>`;
        return;
      }

      setStatus(`${lastSongResults.length} song${lastSongResults.length === 1 ? '' : 's'} found — pick one to find a karaoke video`, false);
      resultsEl.innerHTML = lastSongResults.map(renderSongRow).join('');
    } catch (err) {
      setStatus('Network error — is the server running?', true);
    } finally {
      searchBtn.disabled = false;
    }
  }

  async function findKaraokeVideo(artist, title) {
    resultsEl.innerHTML = '';
    setStatus('<div class="spinner"></div>', false);
    backWrap.style.display = 'block';

    try {
      const params = new URLSearchParams({ artist, title, limit: 12 });
      const res = await fetch(`/video-search?${params.toString()}`);
      const data = await res.json();

      if (!res.ok) {
        setStatus(escapeHtml(data.error || 'Video search failed.'), true);
        return;
      }

      if (!data.results || data.results.length === 0) {
        setStatus('');
        resultsEl.innerHTML = `<div class="empty-state">No karaoke videos found for "${escapeHtml(title)}" by "${escapeHtml(artist)}".</div>`;
        return;
      }

      setStatus(`${data.count} karaoke video${data.count === 1 ? '' : 's'} for "${escapeHtml(title)}" — ${escapeHtml(artist)}`, false);
      resultsEl.innerHTML = data.results.map((v) => renderVideoRow(v, artist, title)).join('');
    } catch (err) {
      setStatus('Network error — is the server running?', true);
    }
  }

  resultsEl.addEventListener('click', (e) => {
    const songRow = e.target.closest('.song-row');
    const openBtn = e.target.closest('.open-btn');

    if (songRow) {
      findKaraokeVideo(songRow.dataset.artist, songRow.dataset.title);
    }

    if (openBtn) {
      window.location.href = openBtn.dataset.url;
    }
  });

  backBtn.addEventListener('click', () => {
    backWrap.style.display = 'none';
    setStatus(`${lastSongResults.length} song${lastSongResults.length === 1 ? '' : 's'} found — pick one to find a karaoke video`, false);
    resultsEl.innerHTML = lastSongResults.map(renderSongRow).join('');
  });

  searchBtn.addEventListener('click', runSongSearch);
  queryInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') runSongSearch();
  });
</script>

</body>
</html>
