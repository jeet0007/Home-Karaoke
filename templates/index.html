<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Karaoke Search</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #181b22;
    --panel-hover: #20242e;
    --border: #2a2e38;
    --text: #e8e9ed;
    --muted: #8b8fa3;
    --accent: #ff4d6d;
    --accent-dim: #7a2536;
    --good: #4dd28c;
    --warn: #e0a95d;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  a { color: var(--accent); }

  header {
    padding: 2.5rem 1.5rem 1.5rem;
    text-align: center;
  }

  header h1 {
    margin: 0 0 0.25rem;
    font-size: 1.8rem;
    letter-spacing: 0.02em;
  }

  header h1 span { color: var(--accent); }

  header p {
    margin: 0;
    color: var(--muted);
    font-size: 0.9rem;
  }

  .song-thumb {
    width: 48px;
    height: 48px;
    object-fit: cover;
    border-radius: 6px;
    flex-shrink: 0;
    background: #000;
  }

  .search-bar-wrapper {
    max-width: 640px;
    margin: 1.5rem auto 0;
    padding: 0 1.5rem;
    position: relative;
  }

  .search-bar {
    display: flex;
    gap: 0.5rem;
  }

  #query {
    flex: 1;
    padding: 0.85rem 1rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    font-size: 1rem;
    outline: none;
  }

  #query:focus {
    border-color: var(--accent);
  }

  #search-btn {
    padding: 0.85rem 1.4rem;
    border-radius: 8px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
  }

  #search-btn:hover { background: #ff2e53; }

  .suggestions-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 0.35rem);
    left: 1.5rem;
    right: 1.5rem;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    max-height: 320px;
    overflow-y: auto;
    z-index: 10;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
  }

  .suggestions-dropdown.open { display: block; }

  .suggestion-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.6rem 0.9rem;
    cursor: pointer;
  }

  .suggestion-item:hover,
  .suggestion-item.active {
    background: var(--panel-hover);
  }

  .suggestion-thumb {
    width: 36px;
    height: 36px;
    object-fit: cover;
    border-radius: 4px;
    flex-shrink: 0;
    background: #000;
  }

  .suggestion-text { min-width: 0; }

  .suggestion-title {
    font-size: 0.92rem;
    font-weight: 600;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .suggestion-meta {
    font-size: 0.78rem;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .suggestion-status {
    padding: 0.7rem 0.9rem;
    color: var(--muted);
    font-size: 0.85rem;
    text-align: center;
  }

  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  #status {
    text-align: center;
    color: var(--muted);
    min-height: 1.5rem;
    margin-bottom: 1rem;
  }

  #status.error { color: var(--accent); }

  #warning-banner {
    display: none;
    max-width: 100%;
    margin: 0 0 1.25rem;
    padding: 0.65rem 1rem;
    border-radius: 8px;
    border: 1px solid var(--warn);
    background: rgba(224, 169, 93, 0.1);
    color: var(--warn);
    font-size: 0.85rem;
    text-align: center;
  }

  .spinner {
    width: 28px;
    height: 28px;
    margin: 1rem auto;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .list {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .song-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.9rem 1.1rem;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  .song-row:hover {
    background: var(--panel-hover);
    border-color: var(--accent);
  }

  .song-info { min-width: 0; }

  .song-title {
    font-weight: 600;
    font-size: 1rem;
  }

  .song-meta {
    color: var(--muted);
    font-size: 0.85rem;
    margin-top: 0.15rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .empty-state {
    text-align: center;
    color: var(--muted);
    padding: 3rem 1rem;
  }

  .library-section {
    margin-top: 2.5rem;
  }

  .library-section[hidden] { display: none; }

  .library-heading {
    margin: 0 0 0.75rem;
    font-size: 1.05rem;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  .library-heading span { color: var(--text); }

  .status-chip {
    flex-shrink: 0;
    font-size: 0.72rem;
    font-weight: 600;
    padding: 0.2rem 0.6rem;
    border-radius: 999px;
    border: 1px solid var(--border);
    color: var(--muted);
    text-transform: capitalize;
  }

  .status-chip.ready { color: var(--good); border-color: var(--good); }
  .status-chip.failed { color: var(--accent); border-color: var(--accent); }
  .status-chip.processing,
  .status-chip.pending { color: var(--warn); border-color: var(--warn); }

  .song-row.not-playable { cursor: default; }

  .song-row.not-playable:hover {
    background: var(--panel);
    border-color: var(--border);
  }

  .stage-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 0.35rem;
    margin-top: 0.4rem;
  }

  .stage-badge {
    font-size: 0.68rem;
    font-weight: 600;
    padding: 0.08rem 0.4rem;
    border-radius: 4px;
    border: 1px solid var(--border);
    color: var(--muted);
    white-space: nowrap;
  }

  .stage-badge.ok,
  .stage-badge.reused { color: var(--good); border-color: var(--accent-dim); }
  .stage-badge.failed { color: var(--accent); border-color: var(--accent-dim); }
  .stage-badge.skipped { color: var(--muted); }
</style>
</head>
<body>

<header>
  <h1>Home <span>Karaoke</span> Search</h1>
  <p>Type a song name and pick one — we handle finding a karaoke backing track for it. Only results with lyrics available are shown.</p>
</header>

<div class="search-bar-wrapper">
  <div class="search-bar">
    <input id="query" type="text" placeholder="e.g. Let Her Go Passenger" autofocus autocomplete="off">
    <button id="search-btn">Search</button>
  </div>
  <div id="suggestions" class="suggestions-dropdown"></div>
</div>

<main>
  <div id="warning-banner"></div>
  <div id="status"></div>
  <div id="results" class="list"></div>

  <!-- The song library (see library.py): ready songs play instantly with a
       melody note guide, pending/processing rows show the background queue
       at work, failed rows say why. Hidden entirely until it has rows. -->
  <section id="library-section" class="library-section" hidden>
    <h2 class="library-heading">Library <span id="library-count"></span></h2>
    <div id="library-list" class="list"></div>
  </section>
</main>

<script type="module" src="/static/index/main.js"></script>

</body>
</html>
