<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Karaoke Search</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #181b22;
    --panel-hover: #20242e;
    --border: #2a2e38;
    --text: #e8e9ed;
    --muted: #8b8fa3;
    --accent: #ff4d6d;
    --accent-dim: #7a2536;
    --good: #4dd28c;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    padding: 2.5rem 1.5rem 1.5rem;
    text-align: center;
  }

  header h1 {
    margin: 0 0 0.25rem;
    font-size: 1.8rem;
    letter-spacing: 0.02em;
  }

  header h1 span { color: var(--accent); }

  header p {
    margin: 0;
    color: var(--muted);
    font-size: 0.9rem;
  }

  .search-bar {
    max-width: 640px;
    margin: 1.5rem auto 0;
    display: flex;
    gap: 0.5rem;
    padding: 0 1.5rem;
  }

  #query {
    flex: 1;
    padding: 0.85rem 1rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    font-size: 1rem;
    outline: none;
  }

  #query:focus {
    border-color: var(--accent);
  }

  #search-btn {
    padding: 0.85rem 1.4rem;
    border-radius: 8px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
  }

  #search-btn:hover { background: #ff2e53; }

  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  #status {
    text-align: center;
    color: var(--muted);
    min-height: 1.5rem;
    margin-bottom: 1.5rem;
  }

  #status.error { color: var(--accent); }

  .spinner {
    width: 28px;
    height: 28px;
    margin: 1rem auto;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1.25rem;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: background 0.15s ease, transform 0.15s ease;
  }

  .card:hover {
    background: var(--panel-hover);
    transform: translateY(-2px);
  }

  .thumb-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #000;
  }

  .thumb-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .duration {
    position: absolute;
    bottom: 6px;
    right: 6px;
    background: rgba(0, 0, 0, 0.8);
    color: #fff;
    font-size: 0.75rem;
    padding: 2px 6px;
    border-radius: 4px;
  }

  .score-badge {
    position: absolute;
    top: 6px;
    left: 6px;
    background: var(--accent-dim);
    color: var(--good);
    font-size: 0.75rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 12px;
    border: 1px solid var(--good);
  }

  .card-body {
    padding: 0.85rem 1rem 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
    flex: 1;
  }

  .title {
    font-size: 0.95rem;
    font-weight: 600;
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .uploader {
    font-size: 0.8rem;
    color: var(--muted);
  }

  .card-actions {
    margin-top: auto;
    display: flex;
    gap: 0.5rem;
    padding-top: 0.5rem;
  }

  .card-actions button {
    flex: 1;
    padding: 0.5rem;
    font-size: 0.8rem;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    cursor: pointer;
  }

  .card-actions button:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .card-actions button.copied {
    border-color: var(--good);
    color: var(--good);
  }

  .empty-state {
    text-align: center;
    color: var(--muted);
    padding: 3rem 1rem;
  }
</style>
</head>
<body>

<header>
  <h1>Home <span>Karaoke</span> Search</h1>
  <p>Type a song name — karaoke, instrumental, and backing-track versions rise to the top.</p>
</header>

<div class="search-bar">
  <input id="query" type="text" placeholder="e.g. Bohemian Rhapsody" autofocus autocomplete="off">
  <button id="search-btn">Search</button>
</div>

<main>
  <div id="status"></div>
  <div id="results" class="grid"></div>
</main>

<script>
  const queryInput = document.getElementById('query');
  const searchBtn = document.getElementById('search-btn');
  const statusEl = document.getElementById('status');
  const resultsEl = document.getElementById('results');

  function setStatus(html, isError) {
    statusEl.innerHTML = html;
    statusEl.className = isError ? 'error' : '';
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str == null ? '' : String(str);
    return div.innerHTML;
  }

  function formatViews(count) {
    if (count == null) return '';
    if (count >= 1_000_000) return (count / 1_000_000).toFixed(1) + 'M views';
    if (count >= 1_000) return (count / 1_000).toFixed(1) + 'K views';
    return count + ' views';
  }

  function renderCard(r) {
    const thumb = r.thumbnail || '';
    const duration = r.duration ? `<span class="duration">${escapeHtml(r.duration)}</span>` : '';
    const views = formatViews(r.view_count);

    return `
      <div class="card">
        <div class="thumb-wrap">
          ${thumb ? `<img src="${escapeHtml(thumb)}" loading="lazy" alt="">` : ''}
          <span class="score-badge">★ ${r.score}</span>
          ${duration}
        </div>
        <div class="card-body">
          <div class="title" title="${escapeHtml(r.title)}">${escapeHtml(r.title)}</div>
          <div class="uploader">${escapeHtml(r.uploader)}${views ? ' · ' + views : ''}</div>
          <div class="card-actions">
            <button class="open-btn" data-url="${escapeHtml(r.url)}">Open in YouTube</button>
            <button class="copy-btn" data-url="${escapeHtml(r.url)}">Copy URL</button>
          </div>
        </div>
      </div>
    `;
  }

  async function runSearch() {
    const query = queryInput.value.trim();
    if (!query) return;

    resultsEl.innerHTML = '';
    setStatus('<div class="spinner"></div>', false);
    searchBtn.disabled = true;

    try {
      const res = await fetch(`/search?q=${encodeURIComponent(query)}&limit=12`);
      const data = await res.json();

      if (!res.ok) {
        setStatus(escapeHtml(data.error || 'Search failed.'), true);
        return;
      }

      if (!data.results || data.results.length === 0) {
        setStatus('');
        resultsEl.innerHTML = `<div class="empty-state">No karaoke results found for "${escapeHtml(query)}". Try a different search.</div>`;
        return;
      }

      setStatus(`${data.count} result${data.count === 1 ? '' : 's'} for "${escapeHtml(query)}"`, false);
      resultsEl.innerHTML = data.results.map(renderCard).join('');
    } catch (err) {
      setStatus('Network error — is the server running?', true);
    } finally {
      searchBtn.disabled = false;
    }
  }

  resultsEl.addEventListener('click', async (e) => {
    const openBtn = e.target.closest('.open-btn');
    const copyBtn = e.target.closest('.copy-btn');

    if (openBtn) {
      window.open(openBtn.dataset.url, '_blank', 'noopener');
    }

    if (copyBtn) {
      try {
        await navigator.clipboard.writeText(copyBtn.dataset.url);
        copyBtn.textContent = 'Copied!';
        copyBtn.classList.add('copied');
        setTimeout(() => {
          copyBtn.textContent = 'Copy URL';
          copyBtn.classList.remove('copied');
        }, 1500);
      } catch (err) {
        copyBtn.textContent = 'Copy failed';
      }
    }
  });

  searchBtn.addEventListener('click', runSearch);
  queryInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') runSearch();
  });
</script>

</body>
</html>
