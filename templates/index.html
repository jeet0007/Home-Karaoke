<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Karaoke Search</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #181b22;
    --panel-hover: #20242e;
    --border: #2a2e38;
    --text: #e8e9ed;
    --muted: #8b8fa3;
    --accent: #ff4d6d;
    --accent-dim: #7a2536;
    --good: #4dd28c;
    --warn: #e0a95d;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  a { color: var(--accent); }

  header {
    padding: 2.5rem 1.5rem 1.5rem;
    text-align: center;
  }

  header h1 {
    margin: 0 0 0.25rem;
    font-size: 1.8rem;
    letter-spacing: 0.02em;
  }

  header h1 span { color: var(--accent); }

  header p {
    margin: 0;
    color: var(--muted);
    font-size: 0.9rem;
  }

  .song-thumb {
    width: 48px;
    height: 48px;
    object-fit: cover;
    border-radius: 6px;
    flex-shrink: 0;
    background: #000;
  }

  .search-bar {
    max-width: 640px;
    margin: 1.5rem auto 0;
    display: flex;
    gap: 0.5rem;
    padding: 0 1.5rem;
  }

  #query {
    flex: 1;
    padding: 0.85rem 1rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    font-size: 1rem;
    outline: none;
  }

  #query:focus {
    border-color: var(--accent);
  }

  #search-btn {
    padding: 0.85rem 1.4rem;
    border-radius: 8px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
  }

  #search-btn:hover { background: #ff2e53; }

  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  #status {
    text-align: center;
    color: var(--muted);
    min-height: 1.5rem;
    margin-bottom: 1rem;
  }

  #status.error { color: var(--accent); }

  #warning-banner {
    display: none;
    max-width: 100%;
    margin: 0 0 1.25rem;
    padding: 0.65rem 1rem;
    border-radius: 8px;
    border: 1px solid var(--warn);
    background: rgba(224, 169, 93, 0.1);
    color: var(--warn);
    font-size: 0.85rem;
    text-align: center;
  }

  .spinner {
    width: 28px;
    height: 28px;
    margin: 1rem auto;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .list {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .song-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.9rem 1.1rem;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  .song-row:hover {
    background: var(--panel-hover);
    border-color: var(--accent);
  }

  .song-info { min-width: 0; }

  .song-title {
    font-weight: 600;
    font-size: 1rem;
  }

  .song-meta {
    color: var(--muted);
    font-size: 0.85rem;
    margin-top: 0.15rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .empty-state {
    text-align: center;
    color: var(--muted);
    padding: 3rem 1rem;
  }
</style>
</head>
<body>

<header>
  <h1>Home <span>Karaoke</span> Search</h1>
  <p>Type a song name and pick one — we handle finding a karaoke backing track for it. Only results with lyrics available are shown.</p>
</header>

<div class="search-bar">
  <input id="query" type="text" placeholder="e.g. Let Her Go Passenger" autofocus autocomplete="off">
  <button id="search-btn">Search</button>
</div>

<main>
  <div id="warning-banner"></div>
  <div id="status"></div>
  <div id="results" class="list"></div>
</main>

<script>
  const queryInput = document.getElementById('query');
  const searchBtn = document.getElementById('search-btn');
  const statusEl = document.getElementById('status');
  const warningEl = document.getElementById('warning-banner');
  const resultsEl = document.getElementById('results');

  function setStatus(html, isError) {
    statusEl.innerHTML = html;
    statusEl.className = isError ? 'error' : '';
  }

  function setWarning(message) {
    if (!message) {
      warningEl.style.display = 'none';
      warningEl.textContent = '';
      return;
    }
    warningEl.textContent = message;
    warningEl.style.display = 'block';
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str == null ? '' : String(str);
    return div.innerHTML;
  }

  function formatDuration(seconds) {
    if (seconds == null) return '';
    seconds = Math.round(Number(seconds));
    if (!Number.isFinite(seconds)) return '';
    const minutes = Math.floor(seconds / 60);
    const secs = seconds % 60;
    return `${minutes}:${String(secs).padStart(2, '0')}`;
  }

  function renderSongRow(song) {
    const meta = [song.album, formatDuration(song.duration_seconds)].filter(Boolean).join(' · ');
    const thumb = song.cover_art || '';
    return `
      <div class="song-row" data-artist="${escapeHtml(song.artist)}" data-title="${escapeHtml(song.title)}" data-duration="${song.duration_seconds != null ? song.duration_seconds : ''}">
        ${thumb ? `<img class="song-thumb" src="${escapeHtml(thumb)}" loading="lazy" alt="">` : ''}
        <div class="song-info">
          <div class="song-title">${escapeHtml(song.title)} <span style="color: var(--muted);">&mdash; ${escapeHtml(song.artist)}</span></div>
          ${meta ? `<div class="song-meta">${escapeHtml(meta)}</div>` : ''}
        </div>
      </div>
    `;
  }

  // Picking a song is the whole journey now - no separate video-picking step.
  // The player page resolves and auto-picks the karaoke video itself via
  // /select-song once it loads.
  function openPlayer(artist, title, duration) {
    const params = new URLSearchParams({ artist, title });
    if (duration) params.set('duration', duration);
    window.location.href = `/player?${params.toString()}`;
  }

  async function runSearch() {
    const query = queryInput.value.trim();
    if (!query) return;

    resultsEl.innerHTML = '';
    setWarning('');
    setStatus('<div class="spinner"></div>', false);
    searchBtn.disabled = true;

    try {
      const res = await fetch(`/unified-search?q=${encodeURIComponent(query)}&limit=12`);
      const data = await res.json();

      if (!res.ok) {
        setStatus(escapeHtml(data.error || 'Search failed.'), true);
        return;
      }

      setWarning(data.warning || '');

      const songs = data.results || [];
      if (songs.length === 0) {
        setStatus('');
        resultsEl.innerHTML = `<div class="empty-state">No songs with lyrics found for "${escapeHtml(query)}". Try a different search.</div>`;
        return;
      }

      setStatus(`${songs.length} song${songs.length === 1 ? '' : 's'} found — pick one to play`, false);
      resultsEl.innerHTML = songs.map(renderSongRow).join('');
    } catch (err) {
      setStatus('Network error — is the server running?', true);
    } finally {
      searchBtn.disabled = false;
    }
  }

  resultsEl.addEventListener('click', (e) => {
    const songRow = e.target.closest('.song-row');
    if (songRow) {
      openPlayer(songRow.dataset.artist, songRow.dataset.title, songRow.dataset.duration);
    }
  });

  searchBtn.addEventListener('click', runSearch);
  queryInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') runSearch();
  });
</script>

</body>
</html>
