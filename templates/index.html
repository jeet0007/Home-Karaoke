<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Karaoke Search</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #181b22;
    --panel-hover: #20242e;
    --border: #2a2e38;
    --text: #e8e9ed;
    --muted: #8b8fa3;
    --accent: #ff4d6d;
    --accent-dim: #7a2536;
    --good: #4dd28c;
    --warn: #e0a95d;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  a { color: var(--accent); }

  header {
    padding: 2.5rem 1.5rem 1.5rem;
    text-align: center;
  }

  header h1 {
    margin: 0 0 0.25rem;
    font-size: 1.8rem;
    letter-spacing: 0.02em;
  }

  header h1 span { color: var(--accent); }

  header p {
    margin: 0;
    color: var(--muted);
    font-size: 0.9rem;
  }

  .song-thumb {
    width: 48px;
    height: 48px;
    object-fit: cover;
    border-radius: 6px;
    flex-shrink: 0;
    background: #000;
  }

  .search-bar-wrapper {
    max-width: 640px;
    margin: 1.5rem auto 0;
    padding: 0 1.5rem;
    position: relative;
  }

  .search-bar {
    display: flex;
    gap: 0.5rem;
  }

  #query {
    flex: 1;
    padding: 0.85rem 1rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    font-size: 1rem;
    outline: none;
  }

  #query:focus {
    border-color: var(--accent);
  }

  #search-btn {
    padding: 0.85rem 1.4rem;
    border-radius: 8px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
  }

  #search-btn:hover { background: #ff2e53; }

  .suggestions-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 0.35rem);
    left: 1.5rem;
    right: 1.5rem;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    max-height: 320px;
    overflow-y: auto;
    z-index: 10;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
  }

  .suggestions-dropdown.open { display: block; }

  .suggestion-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.6rem 0.9rem;
    cursor: pointer;
  }

  .suggestion-item:hover,
  .suggestion-item.active {
    background: var(--panel-hover);
  }

  .suggestion-thumb {
    width: 36px;
    height: 36px;
    object-fit: cover;
    border-radius: 4px;
    flex-shrink: 0;
    background: #000;
  }

  .suggestion-text { min-width: 0; }

  .suggestion-title {
    font-size: 0.92rem;
    font-weight: 600;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .suggestion-meta {
    font-size: 0.78rem;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .suggestion-status {
    padding: 0.7rem 0.9rem;
    color: var(--muted);
    font-size: 0.85rem;
    text-align: center;
  }

  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  #status {
    text-align: center;
    color: var(--muted);
    min-height: 1.5rem;
    margin-bottom: 1rem;
  }

  #status.error { color: var(--accent); }

  #warning-banner {
    display: none;
    max-width: 100%;
    margin: 0 0 1.25rem;
    padding: 0.65rem 1rem;
    border-radius: 8px;
    border: 1px solid var(--warn);
    background: rgba(224, 169, 93, 0.1);
    color: var(--warn);
    font-size: 0.85rem;
    text-align: center;
  }

  .spinner {
    width: 28px;
    height: 28px;
    margin: 1rem auto;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .list {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .song-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.9rem 1.1rem;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  .song-row:hover {
    background: var(--panel-hover);
    border-color: var(--accent);
  }

  .song-info { min-width: 0; }

  .song-title {
    font-weight: 600;
    font-size: 1rem;
  }

  .song-meta {
    color: var(--muted);
    font-size: 0.85rem;
    margin-top: 0.15rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .empty-state {
    text-align: center;
    color: var(--muted);
    padding: 3rem 1rem;
  }

  .library-section {
    margin-top: 2.5rem;
  }

  .library-section[hidden] { display: none; }

  .library-heading {
    margin: 0 0 0.75rem;
    font-size: 1.05rem;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  .library-heading span { color: var(--text); }

  .status-chip {
    flex-shrink: 0;
    font-size: 0.72rem;
    font-weight: 600;
    padding: 0.2rem 0.6rem;
    border-radius: 999px;
    border: 1px solid var(--border);
    color: var(--muted);
    text-transform: capitalize;
  }

  .status-chip.ready { color: var(--good); border-color: var(--good); }
  .status-chip.failed { color: var(--accent); border-color: var(--accent); }
  .status-chip.processing,
  .status-chip.pending { color: var(--warn); border-color: var(--warn); }

  .song-row.not-playable { cursor: default; }

  .song-row.not-playable:hover {
    background: var(--panel);
    border-color: var(--border);
  }

  .stage-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 0.35rem;
    margin-top: 0.4rem;
  }

  .stage-badge {
    font-size: 0.68rem;
    font-weight: 600;
    padding: 0.08rem 0.4rem;
    border-radius: 4px;
    border: 1px solid var(--border);
    color: var(--muted);
    white-space: nowrap;
  }

  .stage-badge.ok,
  .stage-badge.reused { color: var(--good); border-color: var(--accent-dim); }
  .stage-badge.failed { color: var(--accent); border-color: var(--accent-dim); }
  .stage-badge.skipped { color: var(--muted); }
</style>
</head>
<body>

<header>
  <h1>Home <span>Karaoke</span> Search</h1>
  <p>Type a song name and pick one — we handle finding a karaoke backing track for it. Only results with lyrics available are shown.</p>
</header>

<div class="search-bar-wrapper">
  <div class="search-bar">
    <input id="query" type="text" placeholder="e.g. Let Her Go Passenger" autofocus autocomplete="off">
    <button id="search-btn">Search</button>
  </div>
  <div id="suggestions" class="suggestions-dropdown"></div>
</div>

<main>
  <div id="warning-banner"></div>
  <div id="status"></div>
  <div id="results" class="list"></div>

  <!-- The song library (see library.py): ready songs play instantly with a
       melody note guide, pending/processing rows show the background queue
       at work, failed rows say why. Hidden entirely until it has rows. -->
  <section id="library-section" class="library-section" hidden>
    <h2 class="library-heading">Library <span id="library-count"></span></h2>
    <div id="library-list" class="list"></div>
  </section>
</main>

<script>
  const queryInput = document.getElementById('query');
  const searchBtn = document.getElementById('search-btn');
  const statusEl = document.getElementById('status');
  const warningEl = document.getElementById('warning-banner');
  const resultsEl = document.getElementById('results');
  const suggestionsEl = document.getElementById('suggestions');

  const SUGGESTION_DEBOUNCE_MS = 275;
  const SUGGESTION_MIN_QUERY_LENGTH = 2;
  const SUGGESTION_LIMIT = 8;

  function setStatus(html, isError) {
    statusEl.innerHTML = html;
    statusEl.className = isError ? 'error' : '';
  }

  function setWarning(message) {
    if (!message) {
      warningEl.style.display = 'none';
      warningEl.textContent = '';
      return;
    }
    warningEl.textContent = message;
    warningEl.style.display = 'block';
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str == null ? '' : String(str);
    return div.innerHTML;
  }

  function formatDuration(seconds) {
    if (seconds == null) return '';
    seconds = Math.round(Number(seconds));
    if (!Number.isFinite(seconds)) return '';
    const minutes = Math.floor(seconds / 60);
    const secs = seconds % 60;
    return `${minutes}:${String(secs).padStart(2, '0')}`;
  }

  function renderSongRow(song) {
    const meta = [song.album, formatDuration(song.duration_seconds)].filter(Boolean).join(' · ');
    const thumb = song.cover_art || '';
    return `
      <div class="song-row" data-artist="${escapeHtml(song.artist)}" data-title="${escapeHtml(song.title)}" data-duration="${song.duration_seconds != null ? song.duration_seconds : ''}" data-ytm="${escapeHtml(song.ytmusic_video_id || '')}">
        ${thumb ? `<img class="song-thumb" src="${escapeHtml(thumb)}" loading="lazy" alt="">` : ''}
        <div class="song-info">
          <div class="song-title">${escapeHtml(song.title)} <span style="color: var(--muted);">&mdash; ${escapeHtml(song.artist)}</span></div>
          ${meta ? `<div class="song-meta">${escapeHtml(meta)}</div>` : ''}
        </div>
      </div>
    `;
  }

  // Picking a song is the whole journey now - no separate video-picking step.
  // The player page resolves and auto-picks the karaoke video itself via
  // /select-song once it loads. `ytm` (the original recording's YouTube
  // Music video id) rides along so the library worker can extract a
  // reference melody for the note guide.
  function openPlayer(artist, title, duration, ytmusicVideoId) {
    const params = new URLSearchParams({ artist, title });
    if (duration) params.set('duration', duration);
    if (ytmusicVideoId) params.set('ytm', ytmusicVideoId);
    window.location.href = `/player?${params.toString()}`;
  }

  // -- Typeahead suggestions --------------------------------------------
  //
  // /song-suggestions is a thin, unfiltered wrapper around ytmusicapi search
  // (no lyrics-availability check), so it's fast enough to call on every
  // keystroke. Picking a suggestion jumps straight to /player (and from
  // there /select-song) for that exact song, skipping the slow
  // /unified-search lyrics-filter fan-out entirely. Enter/Search without
  // picking a suggestion still falls back to the full /unified-search flow
  // via runSearch(), unchanged.

  let suggestionDebounceTimer = null;
  let suggestionRequestId = 0; // bumped per request; only the latest id's response is rendered, so a slow stale reply can never clobber a newer one
  let suggestionAbortController = null;
  let currentSuggestions = [];
  let activeSuggestionIndex = -1;
  let suggestionsOpen = false;

  function closeSuggestions() {
    suggestionsOpen = false;
    suggestionsEl.classList.remove('open');
    suggestionsEl.innerHTML = '';
    currentSuggestions = [];
    activeSuggestionIndex = -1;
  }

  function renderSuggestionItem(song, index) {
    const meta = [song.album, formatDuration(song.duration_seconds)].filter(Boolean).join(' · ');
    const thumb = song.cover_art || '';
    return `
      <div class="suggestion-item${index === activeSuggestionIndex ? ' active' : ''}" data-index="${index}">
        ${thumb ? `<img class="suggestion-thumb" src="${escapeHtml(thumb)}" loading="lazy" alt="">` : ''}
        <div class="suggestion-text">
          <div class="suggestion-title">${escapeHtml(song.title)} <span style="color: var(--muted);">&mdash; ${escapeHtml(song.artist)}</span></div>
          ${meta ? `<div class="suggestion-meta">${escapeHtml(meta)}</div>` : ''}
        </div>
      </div>
    `;
  }

  function showSuggestionStatus(message) {
    suggestionsOpen = true;
    suggestionsEl.classList.add('open');
    suggestionsEl.innerHTML = `<div class="suggestion-status">${escapeHtml(message)}</div>`;
  }

  function showSuggestionList(songs) {
    suggestionsOpen = true;
    suggestionsEl.classList.add('open');
    suggestionsEl.innerHTML = songs.map((song, i) => renderSuggestionItem(song, i)).join('');
  }

  async function fetchSuggestions(query) {
    const requestId = ++suggestionRequestId;
    if (suggestionAbortController) suggestionAbortController.abort();
    suggestionAbortController = new AbortController();

    showSuggestionStatus('Loading…');

    try {
      const res = await fetch(
        `/song-suggestions?q=${encodeURIComponent(query)}&limit=${SUGGESTION_LIMIT}`,
        { signal: suggestionAbortController.signal }
      );
      // A newer keystroke superseded this request while it was in flight -
      // drop the response so it can't overwrite what's now on screen.
      if (requestId !== suggestionRequestId) return;

      const data = await res.json();
      if (requestId !== suggestionRequestId) return;

      if (!res.ok) {
        showSuggestionStatus(data.error || 'Suggestion lookup failed.');
        return;
      }

      currentSuggestions = data.results || [];
      activeSuggestionIndex = -1;
      if (currentSuggestions.length === 0) {
        showSuggestionStatus('No matches yet — keep typing, or press Enter to search.');
        return;
      }
      showSuggestionList(currentSuggestions);
    } catch (err) {
      if (err.name === 'AbortError' || requestId !== suggestionRequestId) return;
      showSuggestionStatus('Network error fetching suggestions.');
    }
  }

  function scheduleSuggestions(rawQuery) {
    if (suggestionDebounceTimer) clearTimeout(suggestionDebounceTimer);

    const query = rawQuery.trim();
    if (query.length < SUGGESTION_MIN_QUERY_LENGTH) {
      suggestionRequestId++; // invalidate any in-flight request too short to matter now
      if (suggestionAbortController) suggestionAbortController.abort();
      closeSuggestions();
      return;
    }

    suggestionDebounceTimer = setTimeout(() => fetchSuggestions(query), SUGGESTION_DEBOUNCE_MS);
  }

  function selectSuggestion(song) {
    closeSuggestions();
    openPlayer(song.artist, song.title, song.duration_seconds, song.ytmusic_video_id);
  }

  function moveActiveSuggestion(delta) {
    if (currentSuggestions.length === 0) return;
    activeSuggestionIndex = Math.max(-1, Math.min(currentSuggestions.length - 1, activeSuggestionIndex + delta));
    showSuggestionList(currentSuggestions);
  }

  async function runSearch() {
    const query = queryInput.value.trim();
    if (!query) return;

    closeSuggestions();
    resultsEl.innerHTML = '';
    setWarning('');
    setStatus('<div class="spinner"></div>', false);
    searchBtn.disabled = true;

    try {
      const res = await fetch(`/unified-search?q=${encodeURIComponent(query)}&limit=12`);
      const data = await res.json();

      if (!res.ok) {
        setStatus(escapeHtml(data.error || 'Search failed.'), true);
        return;
      }

      setWarning(data.warning || '');

      const songs = data.results || [];
      if (songs.length === 0) {
        setStatus('');
        resultsEl.innerHTML = `<div class="empty-state">No songs with lyrics found for "${escapeHtml(query)}". Try a different search.</div>`;
        return;
      }

      setStatus(`${songs.length} song${songs.length === 1 ? '' : 's'} found — pick one to play`, false);
      resultsEl.innerHTML = songs.map(renderSongRow).join('');
    } catch (err) {
      setStatus('Network error — is the server running?', true);
    } finally {
      searchBtn.disabled = false;
    }
  }

  resultsEl.addEventListener('click', (e) => {
    const songRow = e.target.closest('.song-row');
    if (songRow) {
      openPlayer(songRow.dataset.artist, songRow.dataset.title, songRow.dataset.duration, songRow.dataset.ytm);
    }
  });

  searchBtn.addEventListener('click', runSearch);

  queryInput.addEventListener('input', () => scheduleSuggestions(queryInput.value));

  queryInput.addEventListener('keydown', (e) => {
    if (suggestionsOpen && currentSuggestions.length > 0) {
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        moveActiveSuggestion(1);
        return;
      }
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        moveActiveSuggestion(-1);
        return;
      }
      if (e.key === 'Enter' && activeSuggestionIndex >= 0) {
        e.preventDefault();
        selectSuggestion(currentSuggestions[activeSuggestionIndex]);
        return;
      }
      if (e.key === 'Escape') {
        closeSuggestions();
        return;
      }
    }
    if (e.key === 'Enter') runSearch();
  });

  // mousedown (not click) fires before the input's implicit blur, so the
  // dropdown is still in the DOM and hasn't been torn down by a blur handler
  // when we read which suggestion was picked.
  suggestionsEl.addEventListener('mousedown', (e) => {
    const item = e.target.closest('.suggestion-item');
    if (!item) return;
    e.preventDefault();
    const index = Number(item.dataset.index);
    selectSuggestion(currentSuggestions[index]);
  });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.search-bar-wrapper')) closeSuggestions();
  });

  // -- Song library ------------------------------------------------------
  //
  // GET /library returns every stored song with its queue status. Ready
  // songs play instantly (the player takes /select-song's library fast
  // path, complete with the melody note guide); pending/processing rows
  // show the background worker's progress and auto-refresh until they
  // settle; failed rows carry the reason.
  const librarySection = document.getElementById('library-section');
  const libraryCountEl = document.getElementById('library-count');
  const libraryListEl = document.getElementById('library-list');

  const LIBRARY_REFRESH_MS = 10000;
  let libraryRefreshTimer = null;

  // Per-stage outcome badges (lyrics / video / guide), from the song's
  // `stages` map. Answers "what passed and what failed" at a glance; full
  // reasons are in GET /library/song/<id>'s `report`.
  const STAGE_LABELS = { lyrics: 'lyrics', video: 'backing', melody: 'guide' };
  const STAGE_GLYPH = { ok: '✓', reused: '✓', skipped: '–', failed: '✗' };

  function renderStageBadges(stages) {
    const entries = Object.entries(stages || {});
    if (entries.length === 0) return '';
    const badges = entries
      .map(([stage, status]) => {
        const label = STAGE_LABELS[stage] || stage;
        const glyph = STAGE_GLYPH[status] || '?';
        return `<span class="stage-badge ${escapeHtml(status)}" title="${escapeHtml(stage)}: ${escapeHtml(status)}">${glyph} ${escapeHtml(label)}</span>`;
      })
      .join('');
    return `<div class="stage-badges">${badges}</div>`;
  }

  function renderLibraryRow(song) {
    const playable = song.status === 'ready';
    const metaParts = [song.album, formatDuration(song.duration_seconds)];
    if (song.status === 'failed' && song.error) metaParts.push(song.error);
    const meta = metaParts.filter(Boolean).join(' · ');
    const thumb = song.cover_art || '';
    return `
      <div class="song-row${playable ? '' : ' not-playable'}" data-playable="${playable ? '1' : ''}" data-artist="${escapeHtml(song.artist)}" data-title="${escapeHtml(song.title)}" data-duration="${song.duration_seconds != null ? song.duration_seconds : ''}">
        ${thumb ? `<img class="song-thumb" src="${escapeHtml(thumb)}" loading="lazy" alt="">` : ''}
        <div class="song-info">
          <div class="song-title">${escapeHtml(song.title)} <span style="color: var(--muted);">&mdash; ${escapeHtml(song.artist)}</span></div>
          ${meta ? `<div class="song-meta">${escapeHtml(meta)}</div>` : ''}
          ${renderStageBadges(song.stages)}
        </div>
        <span class="status-chip ${escapeHtml(song.status)}">${escapeHtml(song.status)}</span>
      </div>
    `;
  }

  async function loadLibrary() {
    try {
      const res = await fetch('/library');
      if (!res.ok) return;
      const data = await res.json();
      const songs = data.songs || [];

      if (songs.length === 0) {
        librarySection.hidden = true;
        return;
      }

      const readyCount = songs.filter((s) => s.status === 'ready').length;
      libraryCountEl.textContent = `(${readyCount} ready of ${songs.length})`;
      libraryListEl.innerHTML = songs.map(renderLibraryRow).join('');
      librarySection.hidden = false;

      // Keep polling only while the background worker still has songs in
      // flight; a settled library stops generating requests.
      const inFlight = songs.some((s) => s.status === 'pending' || s.status === 'processing');
      if (inFlight && libraryRefreshTimer === null) {
        libraryRefreshTimer = setTimeout(() => {
          libraryRefreshTimer = null;
          loadLibrary();
        }, LIBRARY_REFRESH_MS);
      }
    } catch (err) {
      // Best-effort - search works fine without the library strip.
    }
  }

  libraryListEl.addEventListener('click', (e) => {
    const songRow = e.target.closest('.song-row');
    if (songRow && songRow.dataset.playable) {
      openPlayer(songRow.dataset.artist, songRow.dataset.title, songRow.dataset.duration);
    }
  });

  loadLibrary();
</script>

</body>
</html>
